# =============================================
# SECURITY/JWT CONFIGURATION
# =============================================
app.jwt.secret=gjgyhuthgvfcduyfhgufehguecnohsufyufhboimfbhugevuhgoibgyeuwhgouiehciorjeomiueiuriywqtugrvynuhnhcgcbsjlcmugchriugiqepooiro
app.jwt.access-token-validity=3600000
app.jwt.refresh-token-validity=2592000000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# =============================================
# CORS CONFIGURATION
# =============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600
app.cors.allow-credentials=true

# =============================================
# PAGINATION CONFIGURATION
# =============================================
app.pagination.default-page-size=20
app.pagination.max-page-size=100
app.pagination.default-page-number=0

# =============================================
# CODE GENERATION CONFIGURATION
# =============================================
app.code-generation.length=8
app.code-generation.expiry-minutes=10
app.code-generation.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789

# =============================================
# ATTENDANCE CONFIGURATION
# =============================================
app.attendance.grace-period-minutes=10
app.attendance.auto-checkout-minutes=120
app.attendance.checkin-window-minutes=30

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.com.mainApp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=TRACE
logging.level.org.springframework.web.servlet=TRACE
logging.level.com.fasterxml.jackson=TRACE
logging.level.org.springframework.transaction=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# =============================================
# SPRING ACTUATOR CONFIGURATION
# =============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.metrics.export.prometheus.enabled=true

# =============================================
# SPRINGDOC/SWAGGER CONFIGURATION
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.mainApp.controller
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.url=/api-docs
springdoc.swagger-ui.doc-expansion=none

# =============================================
# CACHE CONFIGURATION
# =============================================
spring.cache.type=simple
spring.cache.cache-names=codes,users,labs

# =============================================
# SCHEDULING CONFIGURATION
# =============================================
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduling-

# =============================================
# VALIDATION CONFIGURATION
# =============================================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# =============================================
# TIMEZONE CONFIGURATION
# =============================================

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
