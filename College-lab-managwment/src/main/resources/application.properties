spring.application.name=College-lab-managwment




# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/api
server.servlet.session.timeout=30m
server.error.include-stacktrace=never
server.error.include-message=always

# =============================================
# SPRING APPLICATION
# =============================================


# =============================================
# DATABASE CONFIGURATION
# =============================================
#spring.datasource.url=jdbc:postgresql://localhost:5432/college_lab_management
spring.datasource.url=jdbc:postgresql://void-fisher-24479.j77.aws-ap-south-1.cockroachlabs.cloud:26257/defaultdb?sslmode=require
spring.datasource.username=aham
spring.datasource.password=***************************
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# =============================================
# JPA/HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# =============================================
# JACKSON JSON CONFIGURATION
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non-null
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.indent-output=false

# =============================================
# FILE UPLOAD CONFIGURATION
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0
spring.servlet.multipart.location=

